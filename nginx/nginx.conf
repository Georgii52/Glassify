events {}

http {
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  client_max_body_size 500M;

  # Встроенный DNS Docker: имена сервисов резолвятся при запросе, а не при старте nginx
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name trello-analog.ru;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name trello-analog.ru;

    # __CERT_DOMAIN__ подставляется entrypoint из NGINX_CERT_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/__CERT_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERT_DOMAIN__/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /admin {
      return 301 https://$host/admin/;
    }

    # ВАЖНО: при proxy_pass с переменной Nginx передаёт URI как есть — суффикс "/" не отрезает префикс location.
    # Было http://$admin:80/ + /admin/assets/x.js → на admin уходил /admin/assets/x (нет такого файла) → index.html → MIME error.
    location /apiback/ {
      proxy_pass http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
      rewrite ^/admin/(.*)$ /$1 break;
      proxy_pass http://admin:80;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://client:80;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

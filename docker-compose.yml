services:
  admin:
    image: tsoy-optika-admin
    build:
      context: ./admin
      dockerfile: ./Dockerfile
      args:
        # Бэкенд за тем же доменом: https://<домен>/apiback (подставь свой домен в .env или здесь)
        VITE_BASE_URL: ${ADMIN_VITE_BASE_URL:-https://trello-analog.ru/apiback}
        VITE_COOKIE_NAME: ${ADMIN_VITE_COOKIE_NAME:-admin_token}
        VITE_COOKIE_MAX_AGE: ${ADMIN_VITE_COOKIE_MAX_AGE:-604800}
    env_file:
      - ./admin/.env
    networks:
      - tsoy-optika-network
    depends_on:
      - backend
    environment:
      AUTH_TRUST_HOST: "true"
    restart: unless-stopped
  client:
    image: tsoy-optika-client
    build:
      context: ./client
      dockerfile: ./Dockerfile
      args:
        # fetch в index.html: `${BACKEND_URL}/${MODEL_ID}` → префикс .../apiback/glasses
        API_URL: ${CLIENT_API_URL:-https://trello-analog.ru/apiback/glasses}
    env_file:
      - ./client/.env
    networks:
      - tsoy-optika-network
    depends_on:
      - backend
    environment:
      AUTH_TRUST_HOST: "true"
    restart: unless-stopped
  backend:
    image: tsoy-optika-back
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    networks:
      - tsoy-optika-network
    env_file:
      - ./backend/.env
    environment:
      # Совпадает с nginx и healthcheck; перекрывает случайный PORT в .env на сервере
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('net').createConnection(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 120s
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - tsoy-optika-network
    volumes:
      - tsoy-optika-db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  nginx:
    build:
      context: ./nginx
      dockerfile: ./Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      client:
        condition: service_started
      admin:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - tsoy-optika-network
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    environment:
      NGINX_CERT_DOMAIN: trello-analog.ru
    restart: unless-stopped
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"
    networks:
      - tsoy-optika-network
    restart: unless-stopped
volumes:
  tsoy-optika-db:
networks:
  tsoy-optika-network:

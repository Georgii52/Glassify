<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Virtual try-on</title>
  <meta itemprop="name" content="Virtual try-on">
  <meta name="twitter:title" content="Virtual try-on">
  <meta property="og:title" content="Virtual try-on">
  <meta property="og:site_name" content="Virtual try-on">
  <meta name="description" content="Примерка очков">
  <meta itemprop="description" content="Примерка очков">
  <meta property="og:description" content="Примерка очков">
  <meta name="twitter:description" content="Примерка очков">
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,1);
      font-family: sans-serif; color: #fff;
      transition: opacity 0.4s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader-track {
      width: 180px; height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px; overflow: hidden; margin-bottom: 10px;
    }
    #loader-fill {
      height: 100%; background: #fff; border-radius: 2px;
      transition: width 0.15s; width: 0%;
    }
    #loader-label { font-size: 13px; opacity: 0.75; }
  </style>
</head>

<body>
<div id="loader">
  <div id="loader-track"><div id="loader-fill"></div></div>
  <div id="loader-label">Загрузка...</div>
</div>
<script src="bundle.js"></script>


<script>
const BACKEND_URL = '<%= API_URL %>'
const MODEL_ID    = new URLSearchParams(location.search).get('modelId')

// ── Loader ────────────────────────────────────────────────────
const _loaderEl    = document.getElementById('loader')
const _loaderFill  = document.getElementById('loader-fill')
const _loaderLabel = document.getElementById('loader-label')

function setLoader(text, pct) {
  if (_loaderLabel) _loaderLabel.textContent = text
  if (_loaderFill)  _loaderFill.style.width  = pct + '%'
}
function hideLoader() {
  if (!_loaderEl) return
  _loaderEl.classList.add('hidden')
  setTimeout(() => _loaderEl.remove(), 400)
}

if (!MODEL_ID) hideLoader()

// ── Shared state ───────────────────────────────────────────────
let faceMeshObj    = null
let loadedModel    = null
let pendingTransform = null

// ── Helpers ────────────────────────────────────────────────────

function applyTransform(d) {
  if (!loadedModel) { pendingTransform = d; return }
  if (d.position) loadedModel.position.set(...d.position)
  if (d.rotation) loadedModel.quaternion.set(...d.rotation)
  if (d.scale)    loadedModel.scale.set(...d.scale)
  if (d.hidden !== undefined) loadedModel.visible = !d.hidden
}

function loadModelFromBase64(base64, withLoader) {
  const bin = atob(base64)
  const buf = new ArrayBuffer(bin.length)
  const view = new Uint8Array(buf)
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i)
  const url = URL.createObjectURL(new Blob([buf], { type: 'model/gltf-binary' }))

  new THREE.GLTFLoader().load(url, (gltf) => {
    URL.revokeObjectURL(url)
    const model = gltf.scene
    model.traverse((obj) => {
      if (!obj.isMesh) return
      obj.renderOrder = 1
      if (obj.material) { obj.material.depthTest = true; obj.material.depthWrite = true }
    })
    const attach = () => {
      if (!faceMeshObj?.parent) return false
      if (loadedModel) faceMeshObj.parent.remove(loadedModel)
      loadedModel = model
      faceMeshObj.parent.add(loadedModel)
      if (pendingTransform) { applyTransform(pendingTransform); pendingTransform = null }
      if (withLoader) hideLoader()
      console.log('[scene] model attached to face anchor')
      return true
    }
    if (!attach()) {
      const t = setInterval(() => { if (attach()) clearInterval(t) }, 200)
    }
  }, (e) => {
    if (withLoader && e.total)
      setLoader('Обработка модели...', 50 + Math.round(e.loaded / e.total * 50))
  }, (err) => {
    console.error('[scene] GLTFLoader error:', err)
    if (withLoader) { setLoader('Ошибка загрузки', 0); setTimeout(hideLoader, 2000) }
  })
}

// ── Auto-load from backend by modelId ─────────────────────────

async function loadFromBackend() {
  if (!MODEL_ID) return
  console.log('[scene] loading model', MODEL_ID)
  try {
    setLoader('Загрузка данных...', 0)
    const res = await fetch(`${BACKEND_URL}/${MODEL_ID}`)
    if (!res.ok) throw new Error(`HTTP ${res.status}`)

    const contentLength = res.headers.get('content-length')
    let data
    if (contentLength) {
      const total = parseInt(contentLength)
      const reader = res.body.getReader()
      const chunks = []
      let loaded = 0
      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        chunks.push(value)
        loaded += value.length
        setLoader('Загрузка данных...', Math.round(loaded / total * 50))
      }
      const combined = new Uint8Array(loaded)
      let offset = 0
      for (const chunk of chunks) { combined.set(chunk, offset); offset += chunk.length }
      data = JSON.parse(new TextDecoder().decode(combined))
    } else {
      data = await res.json()
      setLoader('Загрузка данных...', 50)
    }

    const dto = data.dto
    if (dto) {
      const parseArr = v => Array.isArray(v) ? v : JSON.parse(v)
      applyTransform({
        position: parseArr(dto.position),
        rotation: parseArr(dto.rotation),
        scale:    parseArr(dto.scale),
      })
    }

    if (data.file?.base64) {
      setLoader('Обработка модели...', 50)
      loadModelFromBase64(data.file.base64, true)
    } else {
      hideLoader()
    }
  } catch (e) {
    console.error('[scene] loadFromBackend error:', e)
    setLoader('Ошибка загрузки', 0)
    setTimeout(hideLoader, 2000)
  }
}

// ── Face mesh finder (для face anchor) ────────────────────────

function registerFaceFinder() {
  XR8.addCameraPipelineModule({
    name: 'face-finder',
    onUpdate: () => {
      if (faceMeshObj) return
      const xrScene = XR8.CloudStudioThreejs?.xrScene?.()
      if (!xrScene?.scene) return
      xrScene.scene.traverse((obj) => {
        if (faceMeshObj) return
        if (obj.isMesh && obj.geometry?.attributes?.position?.count > 400) {
          faceMeshObj = obj
          console.log('[scene] face mesh found')
        }
      })
    }
  })
}

if (window.XR8) {
  registerFaceFinder()
} else {
  window.addEventListener('xrloaded', registerFaceFinder)
}

loadFromBackend()

// ── Admin panel (postMessage) ──────────────────────────────────

window.addEventListener('message', (e) => {
  const d = e.data
  if (!d?.type) return
  if (d.type === 'adminSetTransform') { applyTransform(d); return }
  if (d.type === 'adminLoadModel' && d.base64) loadModelFromBase64(d.base64)
})
</script>
</body>

</html>

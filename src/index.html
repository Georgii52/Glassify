<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Virtual try-on</title>
  <meta itemprop="name" content="Virtual try-on">
  <meta name="twitter:title" content="Virtual try-on">
  <meta property="og:title" content="Virtual try-on">
  <meta property="og:site_name" content="Virtual try-on">
  <meta name="description" content="Примерка очков">
  <meta itemprop="description" content="Примерка очков">
  <meta property="og:description" content="Примерка очков">
  <meta name="twitter:description" content="Примерка очков">
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam">
  </script>

</head>

<body>
<script src="bundle.js"></script>


<script>
// DEBUG = true: показывает occluder цветом (красный = лицо, синий = панели)
const DEBUG = false

function registerOccluder() {
  console.log('[occluder] starting, CloudStudioThreejs:', !!XR8.CloudStudioThreejs)

  let initialized = false
  let faceMeshObj = null
  let rightPanel = null
  let leftPanel = null
  let glassesMeshesFixed = false
  let frameCount = 0

  XR8.addCameraPipelineModule({
    name: 'face-occluder',

    onUpdate: ({ processCpuResult }) => {
      frameCount++

      if (!initialized) {
        // Получаем сцену через CloudStudioThreejs
        let scene = null
        try {
          const xrScene = XR8.CloudStudioThreejs?.xrScene?.()
          if (xrScene) {
            scene = xrScene.scene
            if (frameCount <= 3) console.log('[occluder] CloudStudioThreejs.xrScene() keys:', Object.keys(xrScene))
          }
        } catch(e) {
          if (frameCount <= 3) console.log('[occluder] CloudStudioThreejs error:', e.message)
        }

        if (!scene) return

        // Ищем face mesh в сцене (468 вершин = MediaPipe face mesh)
        scene.traverse((obj) => {
          if (faceMeshObj) return
          if (obj.isMesh && obj.geometry?.attributes?.position?.count > 400) {
            faceMeshObj = obj
            console.log('[occluder] face mesh found! vertices:', obj.geometry.attributes.position.count, 'name:', obj.name)
          }
        })

        if (!faceMeshObj) {
          if (frameCount % 30 === 0) {
            // Каждую секунду логируем сколько мешей нашли
            let meshCount = 0
            scene.traverse(o => { if (o.isMesh) { meshCount++; console.log('  mesh:', o.name, 'verts:', o.geometry?.attributes?.position?.count) }})
            console.log('[occluder] total meshes in scene:', meshCount)
          }
          return
        }

        // Настраиваем face mesh как occluder
        faceMeshObj.material = new THREE.MeshBasicMaterial({
          color: DEBUG ? 0xff0000 : 0x000000,
          colorWrite: DEBUG,
          transparent: DEBUG,
          opacity: DEBUG ? 0.5 : 1,
          depthWrite: true,
          depthTest: true,
          side: THREE.DoubleSide,
        })
        faceMeshObj.renderOrder = 0

        // Боковые панели (следуют за face mesh автоматически)
        const sideMat = new THREE.MeshBasicMaterial({
          color: DEBUG ? 0x0000ff : 0x000000,
          colorWrite: DEBUG,
          transparent: DEBUG,
          opacity: DEBUG ? 0.5 : 1,
          depthWrite: true,
          depthTest: true,
          side: THREE.DoubleSide,
        })
        const panelGeo = new THREE.PlaneGeometry(1, 1)

        rightPanel = new THREE.Mesh(panelGeo, sideMat)
        rightPanel.renderOrder = 0
        faceMeshObj.add(rightPanel)

        leftPanel = new THREE.Mesh(panelGeo, sideMat)
        leftPanel.renderOrder = 0
        faceMeshObj.add(leftPanel)

        initialized = true
        console.log('[occluder] initialized!')
      }

      // Каждый кадр: обновляем позиции боковых панелей по краям лица
      if (!faceMeshObj) return
      const pos = faceMeshObj.geometry.attributes.position
      if (!pos) return

      let minX = Infinity, maxX = -Infinity
      let minY = Infinity, maxY = -Infinity
      let sumZ = 0

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i)
        if (x < minX) minX = x
        if (x > maxX) maxX = x
        if (y < minY) minY = y
        if (y > maxY) maxY = y
        sumZ += z
      }

      const faceW = maxX - minX
      const faceH = maxY - minY
      const centerY = (minY + maxY) / 2
      const centerZ = sumZ / pos.count

      const panelW = -faceW * 0.9
      const panelH = -faceH * 0.8

      // Позиции панелей в local-координатах face mesh
      rightPanel.scale.set(panelW, panelH, 1)
      rightPanel.position.set(minX - panelW / 2, centerY, centerZ)

      leftPanel.scale.set(panelW, panelH, 1)
      leftPanel.position.set(maxX + panelW / 2, centerY, centerZ)

      // Поворачиваем панели к камере (lookAt в world space)
      try {
        const cam = XR8.CloudStudioThreejs.xrScene().rawCameraObject
        if (cam) {
          const camWorldPos = new THREE.Vector3()
          cam.getWorldPosition(camWorldPos)
          rightPanel.getWorldPosition(new THREE.Vector3())  // force matrix update
          rightPanel.lookAt(camWorldPos)
          leftPanel.lookAt(camWorldPos)
        }
      } catch(e) {}

      // renderOrder для очков — поверх occluder'а
      if (!glassesMeshesFixed) {
        try {
          const xrScene = XR8.CloudStudioThreejs?.xrScene?.()
          if (!xrScene?.scene) return
          let found = false
          xrScene.scene.traverse((obj) => {
            if (!obj.isMesh) return
            if (obj === faceMeshObj || faceMeshObj.children.includes(obj)) return
            obj.renderOrder = 1
            if (obj.material) {
              obj.material.depthTest = true
              obj.material.depthWrite = true
            }
            found = true
          })
          if (found) {
            glassesMeshesFixed = true
            console.log('[occluder] glasses renderOrder = 1 set')
          }
        } catch(e) {}
      }
    }
  })
}

if (window.XR8) {
  registerOccluder()
} else {
  window.addEventListener('xrloaded', registerOccluder)
}

// ── Model switcher ──────────────────────────────────────────
const glassesObjects = {}

function findGlassesObjects() {
  const xrScene = XR8.CloudStudioThreejs?.xrScene?.()
  if (!xrScene?.scene) return

  const roots = []
  xrScene.scene.traverse((obj) => {
    if (obj.name === 'Sketchfab_Scene' && obj.parent) {
      roots.push(obj.parent)
    }
  })

  if (roots.length < 2) return

  // glasses.glb стартует видимым, glasses3.glb — скрытым
  const model1 = roots.find(o => o.visible)
  const model2 = roots.find(o => !o.visible)

  if (model1 && model2) {
    glassesObjects['glasses.glb']  = model1
    glassesObjects['glasses3.glb'] = model2
    console.log('[switcher] both glasses found')
    clearInterval(findInterval)
  }
}

let findInterval = null

function startFindingGlasses() {
  findInterval = setInterval(findGlassesObjects, 500)
}

if (window.XR8) {
  startFindingGlasses()
} else {
  window.addEventListener('xrloaded', startFindingGlasses)
}

function selectModel(name, btn) {
  // переключаем Three.js видимость
  Object.keys(glassesObjects).forEach(key => {
    glassesObjects[key].visible = (key === name)
  })

  // обновляем активную кнопку
  document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
}

// ── Admin panel live preview (postMessage) ───────────────────
window.addEventListener('message', (e) => {
  const d = e.data
  if (d?.type !== 'adminSetTransform') return

  const apply = () => {
    const obj = glassesObjects[d.modelName]
    if (!obj) return false
    if (d.position) obj.position.set(...d.position)
    if (d.rotation) obj.quaternion.set(...d.rotation)
    if (d.scale)    obj.scale.set(...d.scale)
    if (d.hidden !== undefined) obj.visible = !d.hidden
    return true
  }

  // Retry until the Three.js object is ready in the scene
  if (!apply()) {
    const t = setInterval(() => { if (apply()) clearInterval(t) }, 200)
  }
})
</script>
</body>

</html>
